<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Nexo Pride - E-commerce Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: #0b0b0b;
      color: #eaeaea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #161616; }
    ::-webkit-scrollbar-thumb { background: #3b3b3b; border-radius: 12px; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      width: 100%;
    }

    /* ===== HEADER (mirip gambar) ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0 1.2rem 0;
      border-bottom: 1px solid #1f1f1f;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #b388ff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo i {
      margin-right: 6px;
      color: #7c4dff;
      -webkit-text-fill-color: #7c4dff;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .header-right .greeting {
      font-size: 0.9rem;
      color: #aaa;
    }
    .header-right .greeting span {
      color: #fff;
      font-weight: 600;
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 1.3rem;
      cursor: pointer;
      position: relative;
      transition: 0.2s;
    }
    .btn-icon:hover { color: #b388ff; }
    .badge {
      background: #7c4dff;
      color: #fff;
      border-radius: 60px;
      font-size: 0.6rem;
      padding: 0.1rem 0.5rem;
      position: absolute;
      top: -8px;
      right: -10px;
      font-weight: 700;
    }

    .btn-admin {
      background: #1c1c1c;
      border: 1px solid #2f2f2f;
      color: #ccc;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-admin:hover { border-color: #7c4dff; color: #fff; }
    .btn-admin.active { border-color: #7c4dff; color: #b388ff; }

    /* ===== CATEGORY TABS (seperti gambar) ===== */
    .category-tabs {
      display: flex;
      gap: 1.8rem;
      padding: 1.2rem 0 0.8rem 0;
      flex-wrap: wrap;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 1.5rem;
    }
    .category-tabs span {
      font-size: 0.95rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: 0.2s;
      padding-bottom: 6px;
      border-bottom: 2px solid transparent;
    }
    .category-tabs span:hover { color: #ddd; }
    .category-tabs span.active {
      color: #b388ff;
      border-bottom-color: #7c4dff;
    }

    /* ===== BANNER SUPER SALE (mirip gambar) ===== */
    .banner-sale {
      background: linear-gradient(145deg, #1a0e2e, #0d0d0d);
      border: 1px solid #2a1a3a;
      border-radius: 28px;
      padding: 1.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .banner-sale .sale-text h2 {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .banner-sale .sale-text h2 span {
      color: #b388ff;
      font-size: 2rem;
    }
    .banner-sale .sale-text p {
      color: #aaa;
      margin-top: 4px;
    }
    .btn-shopnow {
      background: #7c4dff;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 16px rgba(124,77,255,0.25);
    }
    .btn-shopnow:hover { background: #6a3de8; transform: scale(1.02); }

    /* ===== SECTION TITLE ===== */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.8rem 0 1rem 0;
    }
    .section-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
    }
    .section-header a {
      color: #7c4dff;
      font-size: 0.9rem;
      text-decoration: none;
      font-weight: 500;
    }

    /* ===== PRODUCT GRID ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: #131313;
      border-radius: 24px;
      padding: 1rem 0.8rem 1.2rem;
      border: 1px solid #222;
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .product-card:hover { transform: translateY(-4px); border-color: #7c4dff; }

    .product-img {
      width: 100%;
      aspect-ratio: 1/1;
      background: #1c1c1c;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: #7c4dff;
      margin-bottom: 0.7rem;
    }
    .product-tag {
      font-size: 0.65rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .product-name {
      font-weight: 600;
      font-size: 1rem;
      margin: 2px 0 4px;
    }
    .product-price {
      font-weight: 700;
      font-size: 1.1rem;
      color: #b388ff;
    }
    .product-price .old {
      color: #666;
      font-weight: 400;
      font-size: 0.85rem;
      text-decoration: line-through;
      margin-left: 8px;
    }
    .product-stock {
      font-size: 0.7rem;
      color: #777;
      margin: 4px 0 8px;
    }
    .btn-add {
      background: #242424;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      color: #eee;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-top: 4px;
    }
    .btn-add:hover { background: #333; }

    /* ===== ADMIN PANEL ===== */
    .admin-panel {
      background: #101010;
      border-radius: 28px;
      padding: 1.8rem 2rem;
      margin: 2rem 0;
      border: 1px solid #282828;
      display: none;
    }
    .admin-panel.show { display: block; }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin: 1rem 0 1.5rem;
    }
    .stat-box {
      background: #1a1a1a;
      padding: 1rem 1.2rem;
      border-radius: 20px;
      border-left: 3px solid #7c4dff;
    }
    .stat-box .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .stat-box .value { font-size: 1.6rem; font-weight: 700; color: #fff; }

    .order-list {
      background: #151515;
      border-radius: 20px;
      padding: 1rem;
    }
    .order-item {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0;
      border-bottom: 1px solid #242424;
    }
    .order-item:last-child { border-bottom: none; }
    .order-info { display: flex; flex-wrap: wrap; gap: 0.5rem 1.2rem; }
    .order-info span { background: #1f1f1f; padding: 0.15rem 0.8rem; border-radius: 30px; font-size: 0.75rem; }
    .status-pending { color: #ffb74d; }
    .status-approved { color: #81c784; }
    .btn-approve {
      background: #2e7d32;
      border: none;
      color: #fff;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .btn-approve:hover { background: #1b5e20; }

    /* ===== CART / CHECKOUT (mirip Detail) ===== */
    .cart-section {
      background: #101010;
      border-radius: 28px;
      padding: 1.8rem 2rem;
      margin: 2rem 0;
      border: 1px solid #282828;
    }

    .cart-item-list {
      margin: 1rem 0;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #232323;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }
    .checkout-grid input, .checkout-grid select {
      padding: 0.7rem 1rem;
      border-radius: 40px;
      border: 1px solid #2c2c2c;
      background: #181818;
      color: #eee;
      font-size: 0.9rem;
      width: 100%;
    }
    .checkout-grid input:focus { border-color: #7c4dff; outline: none; }

    .qr-box {
      background: #181818;
      padding: 1rem;
      border-radius: 20px;
      text-align: center;
      border: 1px dashed #333;
      grid-column: 1 / -1;
    }
    .qr-box i { font-size: 2.6rem; color: #7c4dff; }

    .btn-checkout {
      background: #7c4dff;
      border: none;
      padding: 0.8rem;
      border-radius: 60px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      grid-column: 1 / -1;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-checkout:hover { background: #6a3de8; }

    /* ===== SIZE SELECTOR (seperti gambar) ===== */
    .size-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 0.8rem;
    }
    .size-selector span {
      background: #1f1f1f;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      border: 1px solid #2f2f2f;
      cursor: default;
    }
    .size-selector span.active { border-color: #7c4dff; color: #b388ff; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: stretch; }
      .header-right { justify-content: space-between; flex-wrap: wrap; }
      .banner-sale { flex-direction: column; text-align: center; gap: 1rem; }
      .checkout-grid { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .admin-stats { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .container { padding: 0.6rem; }
      .product-grid { grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    }

    .footer {
      text-align: center;
      color: #444;
      font-size: 0.7rem;
      padding: 1.5rem 0 0.5rem;
      border-top: 1px solid #181818;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER (mirip gambar: Hey, Alex) -->
  <header class="header">
    <div class="logo"><i class="fas fa-skull"></i> Nexo Pride</div>
    <div class="header-right">
      <span class="greeting">Hey, <span>Admin</span></span>
      <button class="btn-icon" id="cartToggle"><i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span></button>
      <button class="btn-admin" id="adminToggle"><i class="fas fa-user-shield"></i> Admin</button>
    </div>
  </header>

  <!-- CATEGORY TABS -->
  <div class="category-tabs">
    <span class="active">All</span>
    <span>Weapon</span>
    <span>Skin</span>
    <span>Pet</span>
    <span>Pass</span>
  </div>

  <!-- BANNER SUPER SALE -->
  <div class="banner-sale">
    <div class="sale-text">
      <h2>Super Sale <span>Discount</span></h2>
      <p>Up to <strong style="color:#b388ff;">50%</strong> off all items</p>
    </div>
    <button class="btn-shopnow">Shop Now →</button>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">
    <h3 style="display:flex;align-items:center;gap:8px;"><i class="fas fa-crown" style="color:#7c4dff;"></i> Admin Dashboard</h3>
    <div class="admin-stats">
      <div class="stat-box"><div class="label">Pendapatan</div><div class="value" id="totalRevenue">Rp 0</div></div>
      <div class="stat-box"><div class="label">Laba</div><div class="value" id="totalProfit">Rp 0</div></div>
      <div class="stat-box"><div class="label">Rugi</div><div class="value" id="totalLoss">Rp 0</div></div>
      <div class="stat-box"><div class="label">Order</div><div class="value" id="orderCount">0</div></div>
    </div>
    <div class="order-list" id="orderList">
      <div class="order-item"><span style="color:#666;">Belum ada order</span></div>
    </div>
  </div>

  <!-- PRODUCT SECTION -->
  <div class="section-header">
    <h3>🔥 Special For You</h3>
    <a href="#" id="seeAllLink">See All →</a>
  </div>
  <div class="product-grid" id="productGrid"></div>

  <!-- CART / CHECKOUT (seperti Detail) -->
  <div class="cart-section" id="cartSection">
    <h3><i class="fas fa-shopping-bag"></i> Keranjang</h3>
    <div class="cart-item-list" id="cartItems"><p style="color:#666;">Kosong</p></div>
    <div style="font-weight:700;font-size:1.2rem;margin:0.5rem 0;" id="cartTotal">Total: Rp 0</div>

    <!-- Size selector (gaya seperti gambar) -->
    <div class="size-selector">
      <span class="active">S</span><span>M</span><span>L</span><span>XL</span>
    </div>

    <div class="checkout-grid">
      <input type="text" id="custName" placeholder="Nama lengkap" />
      <input type="text" id="custGameId" placeholder="Username / ID Game" />
      <input type="text" id="custPhone" placeholder="No. HP (WA)" />
      <select id="paymentMethod">
        <option value="QRIS">QRIS (QR Code)</option>
        <option value="BCA">BCA Transfer</option>
        <option value="DANA">DANA</option>
      </select>
      <div class="qr-box">
        <i class="fas fa-qrcode"></i>
        <p style="color:#aaa;font-size:0.8rem;">Scan QR / Bayar sesuai metode</p>
      </div>
      <button class="btn-checkout" id="checkoutBtn"><i class="fas fa-check-circle"></i> Konfirmasi & Lanjut WA</button>
    </div>
  </div>

  <div class="footer">Nexo Pride © 2025 — by_rioo👿</div>
</div>

<script>
  (function() {
    // ===== DATA =====
    const products = [
      { id: 1, name: 'Dragon Skin', price: 250000, oldPrice: 320000, stock: 12, icon: 'fa-dragon', tag: 'Skin' },
      { id: 2, name: 'Ultra Blade', price: 185000, oldPrice: 210000, stock: 8, icon: 'fa-crosshairs', tag: 'Weapon' },
      { id: 3, name: 'Mythic Pet', price: 320000, oldPrice: null, stock: 5, icon: 'fa-dog', tag: 'Pet' },
      { id: 4, name: 'Emote Pack', price: 95000, oldPrice: 120000, stock: 20, icon: 'fa-laugh', tag: 'Skin' },
      { id: 5, name: 'Season Pass', price: 150000, oldPrice: null, stock: 15, icon: 'fa-ticket-alt', tag: 'Pass' },
      { id: 6, name: 'VIP Account', price: 500000, oldPrice: 650000, stock: 3, icon: 'fa-crown', tag: 'Pass' }
    ];

    let cart = [];
    let orders = [];
    let adminVisible = false;

    const productGrid = document.getElementById('productGrid');
    const cartItems = document.getElementById('cartItems');
    const cartTotal = document.getElementById('cartTotal');
    const cartCount = document.getElementById('cartCount');
    const orderList = document.getElementById('orderList');
    const adminPanel = document.getElementById('adminPanel');

    // RENDER PRODUK
    function renderProducts() {
      productGrid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="product-img"><i class="fas ${p.icon}"></i></div>
          <div class="product-tag">${p.tag}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">Rp ${p.price.toLocaleString()} ${p.oldPrice ? `<span class="old">Rp ${p.oldPrice.toLocaleString()}</span>` : ''}</div>
          <div class="product-stock"><i class="fas fa-box"></i> Stok: ${p.stock}</div>
          <button class="btn-add" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Add to Cart</button>
        </div>
      `).join('');

      document.querySelectorAll('.btn-add').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.currentTarget.dataset.id);
          addToCart(id);
        });
      });
    }

    // CART
    function addToCart(productId) {
      const prod = products.find(p => p.id === productId);
      if (!prod) return;
      if (prod.stock <= 0) { alert('Stok habis!'); return; }
      const existing = cart.find(item => item.id === productId);
      if (existing) {
        if (existing.qty < prod.stock) { existing.qty += 1; }
        else { alert('Stok tidak cukup'); return; }
      } else {
        cart.push({ ...prod, qty: 1 });
      }
      updateCartUI();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCartUI();
    }

    function updateCartUI() {
      if (cart.length === 0) {
        cartItems.innerHTML = `<p style="color:#666;">Keranjang kosong</p>`;
        cartTotal.textContent = 'Total: Rp 0';
      } else {
        cartItems.innerHTML = cart.map(item => `
          <div class="cart-item">
            <span><strong>${item.name}</strong> x${item.qty} <span style="color:#b388ff;">Rp ${(item.price * item.qty).toLocaleString()}</span></span>
            <button style="background:transparent;border:none;color:#ff6b6b;cursor:pointer;" data-remove="${item.id}"><i class="fas fa-trash-alt"></i></button>
          </div>
        `).join('');
        const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
        cartTotal.textContent = `Total: Rp ${total.toLocaleString()}`;
        document.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.currentTarget.dataset.remove);
            removeFromCart(id);
          });
        });
      }
      const totalItems = cart.reduce((sum, i) => sum + i.qty, 0);
      cartCount.textContent = totalItems;
    }

    // CHECKOUT
    document.getElementById('checkoutBtn').addEventListener('click', function() {
      if (cart.length === 0) { alert('Keranjang kosong!'); return; }
      const name = document.getElementById('custName').value.trim();
      const gameId = document.getElementById('custGameId').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const payment = document.getElementById('paymentMethod').value;
      if (!name || !gameId || !phone) {
        alert('Harap isi Nama, ID Game, dan No HP');
        return;
      }
      const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
      const order = {
        id: Date.now(),
        customer: name,
        gameId: gameId,
        phone: phone,
        payment: payment,
        items: JSON.stringify(cart.map(i => ({ name: i.name, qty: i.qty, price: i.price }))),
        total: total,
        status: 'pending',
        createdAt: new Date().toLocaleString()
      };
      orders.push(order);
      cart.forEach(c => {
        const prod = products.find(p => p.id === c.id);
        if (prod) prod.stock = Math.max(0, prod.stock - c.qty);
      });
      cart = [];
      updateCartUI();
      renderProducts();
      updateAdminStats();

      const waMsg = `Halo Nexo Pride! Saya ${name} (${gameId}) sudah transfer ${payment} sebesar Rp ${total.toLocaleString()}. Mohon approve ya.`;
      window.open(`https://wa.me/628123456789?text=${encodeURIComponent(waMsg)}`, '_blank');
      alert('Order dibuat! Silakan konfirmasi via WhatsApp.');
      document.getElementById('custName').value = '';
      document.getElementById('custGameId').value = '';
      document.getElementById('custPhone').value = '';
    });

    // ADMIN
    function updateAdminStats() {
      const totalRev = orders.reduce((sum, o) => sum + (o.status === 'approved' ? o.total : 0), 0);
      const profit = Math.round(totalRev * 0.4);
      const loss = Math.round(totalRev * 0.1) + (orders.filter(o => o.status === 'pending').length * 5000);
      document.getElementById('totalRevenue').textContent = `Rp ${totalRev.toLocaleString()}`;
      document.getElementById('totalProfit').textContent = `Rp ${profit.toLocaleString()}`;
      document.getElementById('totalLoss').textContent = `Rp ${loss.toLocaleString()}`;
      document.getElementById('orderCount').textContent = orders.length;

      if (orders.length === 0) {
        orderList.innerHTML = `<div class="order-item"><span style="color:#666;">Belum ada order</span></div>`;
      } else {
        orderList.innerHTML = orders.slice().reverse().map(o => `
          <div class="order-item">
            <div class="order-info">
              <span><i class="fas fa-user"></i> ${o.customer}</span>
              <span><i class="fas fa-gamepad"></i> ${o.gameId}</span>
              <span><i class="fas fa-phone"></i> ${o.phone}</span>
              <span>Rp ${o.total.toLocaleString()}</span>
              <span class="${o.status === 'approved' ? 'status-approved' : 'status-pending'}">${o.status}</span>
            </div>
            ${o.status === 'pending' ? `<button class="btn-approve" data-order="${o.id}">Approve</button>` : `<span style="color:#4caf50;">✓ Approved</span>`}
          </div>
        `).join('');
        document.querySelectorAll('.btn-approve').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.order);
            const order = orders.find(o => o.id === id);
            if (order) { order.status = 'approved'; updateAdminStats(); alert('Order approved!'); }
          });
        });
      }
    }

    // TOGGLE ADMIN
    document.getElementById('adminToggle').addEventListener('click', function() {
      adminVisible = !adminVisible;
      adminPanel.classList.toggle('show', adminVisible);
      this.classList.toggle('active', adminVisible);
      if (adminVisible) updateAdminStats();
    });

    document.getElementById('cartToggle').addEventListener('click', function() {
      document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
    });

    // INIT
    renderProducts();
    updateCartUI();
    adminPanel.classList.remove('show');
  })();
</script>

</body>
</html>
